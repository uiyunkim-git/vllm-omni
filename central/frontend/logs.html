<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs - {{ deploy_id }}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #log-header {
            background-color: #252526;
            padding: 10px 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #log-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>

<body>
    <div id="log-header">
        <div>
            <h5 class="mb-0 text-light"><i class="fa-solid fa-terminal text-success me-2"></i>Live Logs: <span class="text-info">{{ deploy_id }}</span></h5>
            <small class="text-muted" id="status-text">Connecting to log stream...</small>
        </div>
        <div>
            <div class="form-check form-switch d-inline-block me-3">
                <input class="form-check-input" type="checkbox" id="autoScrollCheck" checked>
                <label class="form-check-label text-light small" for="autoScrollCheck">Auto-Scroll</label>
            </div>
            <button class="btn btn-sm btn-outline-light" onclick="window.close()"><i class="fa-solid fa-xmark"></i> Close</button>
        </div>
    </div>

    <div id="log-container">Loading logs...</div>

    <script>
        const deployId = "{{ deploy_id }}";
        const params = new URLSearchParams(window.location.search);
        const containerName = params.get('container');

        const logContainer = document.getElementById('log-container');
        const statusText = document.getElementById('status-text');
        const autoScroll = document.getElementById('autoScrollCheck');

        let source = null;
        let isFirstMessage = true;
        let reconnectTimeout = null;

        if (containerName) {
            statusText.textContent = containerName;
        }

        function connect() {
            if (source) source.close();
            isFirstMessage = true;

            let url = `/api/deployments/${deployId}/logs`;
            if (containerName) url += `?container_name=${encodeURIComponent(containerName)}`;

            source = new EventSource(url);

            source.onopen = function () {
                statusText.textContent = `Connected (Streaming live${containerName ? ' - ' + containerName : ''})`;
            };

            source.onmessage = function (event) {
                if (isFirstMessage) {
                    logContainer.textContent = '';
                    isFirstMessage = false;
                }
                logContainer.appendChild(document.createTextNode(event.data + '\n'));
                if (logContainer.childNodes.length > 5000) {
                    for (let i = 0; i < 1000; i++) logContainer.removeChild(logContainer.firstChild);
                }
                if (autoScroll.checked) logContainer.scrollTop = logContainer.scrollHeight;
            };

            source.onerror = function () {
                statusText.textContent = 'Connection lost. Reconnecting...';
                source.close();
                reconnectTimeout = setTimeout(connect, 3000);
            };
        }

        connect();
    </script>
</body>

</html>
