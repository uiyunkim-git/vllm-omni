<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vLLM Omni Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f0f2f5; font-size: 15px; }
        .small, small { font-size: .875rem !important; }
        .form-text { font-size: .8rem !important; }

        /* Navbar */
        .navbar {
            border-bottom: 1px solid rgba(255,255,255,.08);
        }

        .card {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,.06) !important;
        }
        .card-header {
            background: transparent;
            border-bottom: 1px solid #e5e7eb;
            font-weight: 600;
            padding: .6rem 1rem;
        }

        /* Stat pill badges */
        .stat-active { background: #d1fae5; color: #065f46; }
        .stat-idle   { background: #f3f4f6; color: #6b7280; }
        .stat-rps    { background: #dbeafe; color: #1d4ed8; }

        /* Table inside card */
        .table-card { border-radius: 10px; overflow: hidden; }
        .table-card .table { margin: 0; }
        .table-card .table tbody tr:last-child td { border-bottom: none; }
        .table-card .table td { padding: .65rem 1rem; vertical-align: middle; }

        /* GPU bar */
        .gpu-bar { height: 6px; border-radius: 3px; }

        /* Config row hover */
        .config-row:hover { background: #f8f9fa; }

        .section-title {
            font-size: .8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: #6b7280;
            margin-bottom: 1rem;
            padding-bottom: .5rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .table th { font-size: .875rem; font-weight: 600; }
        .table td { font-size: .9375rem; }

        /* GPU checkbox cards in deploy modal */
        .gpu-checkbox-label {
            display: inline-block;
            width: 90px;
            flex-shrink: 0;
            padding: 6px 8px;
            border: 1px solid #e5e7eb;
            border-radius: 7px;
            cursor: pointer;
            background: #fff;
            transition: border-color .15s, background .15s;
            overflow: hidden;
        }
        .gpu-checkbox-label:hover { border-color: #3b82f6; background: #eff6ff; }
        .btn-check:checked + .gpu-checkbox-label {
            border-color: #3b82f6;
            background: #eff6ff;
            box-shadow: 0 0 0 2px #bfdbfe;
        }

        /* Page content spacing */
        .page-content {
            padding-top: 1.5rem;
            padding-bottom: 3rem;
        }

        /* Toast-style alert container */
        #alert-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
            width: 320px;
        }

        /* Modal polish */
        .modal-content {
            border: none;
            border-radius: 14px;
            overflow: hidden;
        }
        .modal-header {
            border-bottom: none;
            padding: 1.5rem 1.5rem 0.5rem;
        }
        .modal-footer {
            border-top: none;
            padding: 0.5rem 1.5rem 1.5rem;
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-xl">
            <a class="navbar-brand fw-bold" href="/"><i class="fa-solid fa-server me-2"></i>OmniServe</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 nav-pills gap-2">
                    <li class="nav-item">
                        <a class="nav-link {% if active_tab == 'dashboard' %}active{% endif %}" href="/">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_tab == 'configs' %}active{% endif %}" href="/configs">Configs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_tab == 'endpoints' %}active{% endif %}" href="/endpoints">Endpoints</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_tab == 'gateway' %}active{% endif %}" href="/gateway"><i class="fa-solid fa-server me-1"></i>Gateway</a>
                    </li>
                </ul>
                <a href="/deploy" class="btn btn-primary ms-2">
                    <i class="fa-solid fa-rocket me-1"></i>New Deployment
                </a>
            </div>
        </div>
    </nav>

    <div class="container-xl page-content">
        <div id="alert-container"></div>
        {% block content %}{% endblock %}
    </div>

    {% include 'modals.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.activeTab = "{{ active_tab }}";
    </script>
    <script src="/static/app.js"></script>
</body>

</html>
