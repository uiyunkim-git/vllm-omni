<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vLLM Omni Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }

        .endpoint-card {
            margin-bottom: 15px;
        }

            {
            % block extra_styles %
        }

            {
            % endblock %
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fa-solid fa-server me-2"></i>OmniServe</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 nav-pills gap-2">
                    <li class="nav-item">
                        <a class="nav-link {% if active_tab == 'dashboard' %}active{% endif %}" href="/">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_tab == 'configs' %}active{% endif %}"
                            href="/configs">Configs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_tab == 'endpoints' %}active{% endif %}"
                            href="/endpoints">Endpoints</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_tab == 'gateway' %}active{% endif %}" href="/gateway"><i
                                class="fa-solid fa-server me-1"></i> Gateway</a>
                    </li>
                </ul>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#deployModal"
                    onclick="resetDeployModal()">New Deployment</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="alert-container"></div>
        {% block content %}{% endblock %}
    </div>

    {% include 'modals.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.activeTab = "{{ active_tab }}";
    </script>
    <script src="/static/app.js"></script>
</body>

</html>
