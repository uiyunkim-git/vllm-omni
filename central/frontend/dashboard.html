{% extends 'base.html' %}

{% block content %}

<div class="section-title"><i class="fa-solid fa-chart-line me-1"></i>Inference Throughput</div>
<div class="row mb-4" id="model-stats-container">
    <div class="col-12 text-muted small">No inference data yet.</div>
</div>

<div class="section-title"><i class="fa-solid fa-network-wired me-1"></i>Active Deployments</div>
<div class="mb-4">
    <div class="card table-card">
        <table class="table table-hover">
            <thead class="table-light">
                <tr>
                    <th class="small text-muted fw-semibold">이름</th>
                    <th class="small text-muted fw-semibold">모델</th>
                    <th class="small text-muted fw-semibold">엔진 / 모드</th>
                    <th class="small text-muted fw-semibold">상태</th>
                    <th class="small text-muted fw-semibold">GPUs</th>
                    <th class="small text-muted fw-semibold text-end">액션</th>
                </tr>
            </thead>
            <tbody id="deployments-table-body"></tbody>
        </table>
    </div>
</div>

<div class="section-title"><i class="fa-solid fa-microchip me-1"></i>GPU Status</div>
<div class="row mb-4" id="gpu-cards-container"></div>

{% endblock %}
