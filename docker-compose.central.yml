version: '3.9'

services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: vllm_omni_tailscale
    hostname: vllm-omni-proxy
    restart: unless-stopped
    env_file: .env.central
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_HOSTNAME=vllm-omni-proxy
      - TS_EXTRA_ARGS=--reset
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    ports:
      - "${PROXY_PORT:-11434}:4000"
      - "8080:8080"
    networks:
      vllm_network:
        aliases:
          - vllm_omni_proxy

  vllm_router:
    build:
      context: ./central/go_proxy
    container_name: vllm_omni_proxy
    restart: unless-stopped
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
    volumes:
      - ./central/go_proxy/config.json:/app/config.json

  central:
    build:
      context: ./central
    container_name: vllm_omni_central
    restart: unless-stopped
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
    env_file: .env.central
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./central/main.py:/app/main.py
      - ./central/manager.py:/app/manager.py
      - ./central/go_proxy:/app/go_proxy_config
      - ./central/templates:/app/templates
      - ./central/frontend/static:/app/frontend/static
      - ./central/frontend:/app/frontend
      - ./central/data:/app/data

volumes:
  tailscale-state:

networks:
  vllm_network:
    external: true
    name: vllm_default
